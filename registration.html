    <!--Below is the ContentS-->
        <p class="display-1 text-center mt-4"
        style="color: #1e1e1e; text-shadow: 5px 5px 10px #000000;">
            Register Now!
        </p>

        <div class="container d-flex justify-content-center align-items-center"
            style="min-height: 80vh;">

            <form class="w-75 w-md-50">
                <fieldset class="border p-4 rounded shadow"
                        style="border-color: #ccc; background-color: #ffffffd9;">

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col-md-6 mt-2 mt-md-0">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Age</label>
                            <input type="number" class="form-control">
                        </div>
                        <div class="col-md-6 mt-2 mt-md-0">
                            <label class="form-label">Contact Number</label>
                            <input type="tel" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <a href="confirmationpage.html" style="color: white; text-decoration: none;">Create My Account</a>
                        </button>
                        <button type="reset" class="btn btn-secondary">
                            Reset
                        </button>
                    </div>

                </fieldset>
            </form>
